<div class="dashboard-layout">
    <web-sidebar [role]="'authority'"></web-sidebar>
    <div class="main-content">
        <web-topbar [pageTitle]="'Request Approvals'"></web-topbar>
        <main class="page-content">

            <div class="page-header">
                <h1>Pending Approvals</h1>
                <p>Review and act on student requests for Home-going and Mess-cut.</p>
            </div>

            <div class="approval-grid">


                <!-- Home Going Card -->
                <div class="card approval-card" *ngIf="canApproveHomeGoing">
                    <div class="card-header">
                        <h3><i class="bi bi-house-door"></i> Home Going Requests ({{ homeGoings.length }})</h3>
                    </div>
                    <div class="request-list">
                        <div *ngIf="homeGoings.length === 0" class="empty-list">No pending home-going requests.</div>
                        <div *ngFor="let r of homeGoings" class="req-item">
                            <div class="req-main">
                                <div class="student-info">
                                    <span class="name">{{ r.student?.name }}</span>
                                    <span class="meta">Room {{ r.student?.roomNumber }}</span>
                                </div>
                                <div class="dest"> Leaving for: <strong>{{ r.place }}</strong></div>
                                <div class="date"> Date: {{ r.leaveDate | date:'fullDate' }}</div>
                            </div>
                            <div class="req-actions">
                                <input class="form-control" [(ngModel)]="r._remarks" placeholder="Add remarks..." />
                                <div class="btn-group">
                                    <button class="btn-approve" (click)="updateHomeGoing(r, 'approved')"><i class="bi bi-check-circle"></i> Approve</button>
                                    <button class="btn-reject" (click)="updateHomeGoing(r, 'rejected')"><i class="bi bi-x-circle"></i> Reject</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>
