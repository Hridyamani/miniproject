<div *ngIf="locationAllowed; else locationBlocked">
  <router-outlet></router-outlet>
</div>

<ng-template #locationBlocked>
  <div class="location-access-screen">
    <div class="emoji-icon">📍</div>
    <h1>Location Access Required</h1>
    <p>StaySphere needs access to your location for security and check-in tracking.
       Please allow location permission to access the platform.</p>
    <button class="btn-retry" (click)="requestLocation()">
      Enable Access
    </button>
  </div>
</ng-template>
