<div *ngIf="locationAllowed; else locationBlocked">
  <router-outlet></router-outlet>
</div>

<ng-template #locationBlocked>
  <div class="location-access-screen">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <i class="bi bi-geo-alt-fill"></i>
    <h1>Location Access Required</h1>
    <p>To ensure security and proper check-in/out tracking, StaySphere requires access to your location. 
       Please allow location permissions to access the platform.</p>
    <button class="btn-retry" (click)="requestLocation()">
      Enable Access
    </button>
  </div>
</ng-template>
